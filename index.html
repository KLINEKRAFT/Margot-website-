<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Margot's Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --img-sky:        url('layer-1-sky.png');
    --img-far:        url('layer-2-far-foliage.png');
    --img-wildflowers:url('layer-3-wildflowers.png');
    --img-foreground: url('layer-4-foreground-grass.png');
    --img-margot:     url('layer-5-margot.png');

    --lavender: #c9b8e0;
    --pink:     #f3c5cf;
    --sage:     #b5c4a8;
    --cream:    #faf3e7;
    --ink:      #5a4a6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #e8dcf2;
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
  }

  .scene { position: fixed; inset: 0; overflow: hidden; }

  .layer {
    position: absolute;
    inset: 0;
    background-repeat: no-repeat;
    background-position: center bottom;
    background-size: cover;
    will-change: transform;
    pointer-events: none;
    transform-origin: bottom center;
  }

  .layer-sky          { background-image: var(--img-sky); background-position: center center; }
  .layer-far          { background-image: var(--img-far); opacity: 0.92; }
  .layer-wildflowers  { background-image: var(--img-wildflowers); }
  .layer-foreground   { background-image: var(--img-foreground); z-index: 6; }

  .margot-stage {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: min(720px, 95vw);
    height: 100vh;
    z-index: 4;
    will-change: transform;
    pointer-events: none;
    transform-origin: bottom center;
  }

  .margot {
    position: absolute;
    inset: 0;
    background-image: var(--img-margot);
    background-repeat: no-repeat;
    background-position: center bottom;
    background-size: contain;
    transform-origin: bottom center;
    filter: drop-shadow(0 16px 28px rgba(90, 74, 107, 0.18));
    will-change: transform;
  }

  .banner-text {
    position: absolute;
    left: 50%;
    top: 5%;
    width: 30%;
    min-width: 220px;
    text-align: center;
    transform-origin: bottom center;
    z-index: 5;
    padding-top: 14px;
    will-change: transform;
  }

  .banner-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    margin-bottom: 2px;
  }

  .banner-title {
    font-family: 'Sacramento', cursive;
    font-size: clamp(28px, 3.2vw, 44px);
    line-height: 0.9;
    color: #6b4d80;
    margin-bottom: 4px;
  }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-top: 4px;
  }

  .unit { display: flex; flex-direction: column; align-items: center; }

  .unit-num {
    font-family: 'Sacramento', cursive;
    font-size: clamp(20px, 2.4vw, 32px);
    line-height: 1;
    color: #6b4d80;
    min-width: 1.2em;
  }

  .unit-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.6;
    margin-top: 1px;
  }

  body.birthday .countdown,
  body.birthday .banner-label { display: none; }
  .happy-message {
    display: none;
    font-family: 'Sacramento', cursive;
    font-size: clamp(20px, 2.4vw, 30px);
    color: #6b4d80;
    line-height: 1;
    margin-top: 2px;
  }
  body.birthday .happy-message { display: block; }
  body.birthday .banner-title { font-size: clamp(26px, 2.8vw, 36px); }

  /* Petals */
  .petal {
    position: absolute;
    top: -40px;
    border-radius: 50% 10% 50% 10%;
    will-change: transform;
    z-index: 7;
    pointer-events: none;
  }
  .petal.pink     { background: var(--pink); }
  .petal.lavender { background: var(--lavender); }
  .petal.cream    { background: var(--cream); border: 1px solid rgba(122,90,140,0.1); }
  .petal.sage     { background: var(--sage); }

  /* Pollen motes */
  .mote {
    position: absolute;
    border-radius: 50%;
    will-change: transform, opacity;
    z-index: 6;
    pointer-events: none;
    background: var(--cream);
    box-shadow: 0 0 4px rgba(250, 243, 231, 0.6);
  }

  /* Butterflies */
  .butterfly {
    position: absolute;
    z-index: 8;
    pointer-events: none;
    will-change: transform;
  }
  .butterfly svg { width: 100%; height: 100%; }
  .butterfly .wing {
    transform-origin: center;
    animation: flap 0.18s ease-in-out infinite alternate;
  }
  .butterfly .wing.left { transform: scaleX(-1); transform-origin: center; }

  @keyframes flap {
    from { transform: scaleX(0.4); }
    to   { transform: scaleX(1); }
  }

  /* Signature */
  .signature {
    position: fixed;
    bottom: 18px;
    right: 22px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.4;
    z-index: 20;
    user-select: none;
  }
  .signature::before {
    content: '✦';
    font-style: normal;
    margin-right: 8px;
    opacity: 0.6;
  }

  @media (max-width: 640px) {
    .margot-stage { width: 100vw; }
    .banner-text { width: 38%; min-width: 180px; top: 4%; }
    .unit-num { font-size: 18px; }
    .unit-label { font-size: 7px; letter-spacing: 0.12em; }
    .banner-title { font-size: 24px; }
    .signature { font-size: 10px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .butterfly .wing { animation: none !important; }
  }
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="layer layer-sky" data-depth="0"></div>
  <div class="layer layer-far" data-depth="8" data-wind="0.4" data-sway="0.6"></div>
  <div class="layer layer-wildflowers" data-depth="16" data-wind="0.7" data-sway="1.0"></div>

  <div class="margot-stage" data-depth="20">
    <div class="margot" data-wind="0.25" data-sway="0.3"></div>
    <div class="banner-text" data-wind="0.55" data-sway="0.5">
      <div class="banner-label" id="bannerLabel">Until my birthday</div>
      <div class="banner-title">Margot</div>
      <div class="countdown" id="countdown">
        <div class="unit"><div class="unit-num" id="d">00</div><div class="unit-label">Days</div></div>
        <div class="unit"><div class="unit-num" id="h">00</div><div class="unit-label">Hrs</div></div>
        <div class="unit"><div class="unit-num" id="m">00</div><div class="unit-label">Min</div></div>
        <div class="unit"><div class="unit-num" id="s">00</div><div class="unit-label">Sec</div></div>
      </div>
      <div class="happy-message">Happy<br/>Birthday!</div>
    </div>
  </div>

  <div class="layer layer-foreground" data-depth="32" data-wind="1.0" data-sway="1.4"></div>

  <div id="motes"></div>
  <div id="petals"></div>
  <div id="butterflies"></div>
</div>

<div class="signature">KLINEKRAFT</div>

<script>
  /* ------------------------------------------------------------
     UNIFIED WIND SYSTEM
     One global wind value drives everything.
       Baseline: gentle continuous sine breeze
       Gusts:    occasional swells that ripple back-to-front
     Each element samples wind at its own depth-based delay,
     so a gust visibly travels through the scene.
     ------------------------------------------------------------ */
  const Wind = {
    baseAmp: 1.0,
    basePeriod: 5200,
    gusts: [],
    scheduleNext() {
      const delay = 7000 + Math.random() * 9000;
      setTimeout(() => {
        this.gusts.push({
          startTime: performance.now(),
          duration: 3500 + Math.random() * 2500,
          peak: 1.4 + Math.random() * 1.1,
          direction: Math.random() < 0.5 ? -1 : 1
        });
        this.scheduleNext();
      }, delay);
    },
    sample(now, delay = 0) {
      const t = now - delay;
      const base = Math.sin((t / this.basePeriod) * Math.PI * 2) * this.baseAmp;
      let gust = 0;
      let gustSigned = 0;
      for (let i = this.gusts.length - 1; i >= 0; i--) {
        const g = this.gusts[i];
        const elapsed = t - g.startTime;
        if (elapsed < 0) continue;
        if (elapsed > g.duration) {
          if (delay === 0) this.gusts.splice(i, 1);
          continue;
        }
        const phase = elapsed / g.duration;
        const bell = Math.sin(phase * Math.PI);
        const ripple = 1 + Math.sin(phase * Math.PI * 3) * 0.15;
        const intensity = bell * ripple;
        gust = Math.max(gust, intensity);
        gustSigned += intensity * g.peak * g.direction;
      }
      return { v: base + gustSigned, gust };
    }
  };
  Wind.scheduleNext();

  /* ------------------------------------------------------------
     LAYER + MARGOT + BANNER ANIMATION
     ------------------------------------------------------------ */
  const windedEls = document.querySelectorAll('[data-wind]');
  const layers = document.querySelectorAll('[data-depth]');

  let mx = 0, my = 0, tx = 0, ty = 0;
  window.addEventListener('mousemove', (e) => {
    mx = (e.clientX / window.innerWidth - 0.5) * 2;
    my = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma == null || e.beta == null) return;
    mx = Math.max(-1, Math.min(1, e.gamma / 30));
    my = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
  });

  let globalGust = 0;

  function tickFrame(now) {
    tx += (mx - tx) * 0.06;
    ty += (my - ty) * 0.06;

    const main = Wind.sample(now, 0);
    globalGust = main.gust;

    windedEls.forEach((el) => {
      const windResp = parseFloat(el.dataset.wind) || 0;
      const sway = parseFloat(el.dataset.sway) || 0;
      const depth = parseFloat(el.dataset.depth || el.parentElement?.dataset.depth || 0);
      // Back layers receive wind first; foreground last
      const delay = (32 - depth) * 18;
      const sample = Wind.sample(now, delay);

      const rotDeg = sample.v * sway * 1.8;
      const shiftX = sample.v * windResp * 8;
      const isCharacter = el.classList.contains('margot');
      const isBanner = el.classList.contains('banner-text');
      const tiltCap = isCharacter ? 1.5 : (isBanner ? 1.2 : 5);
      const finalRot = Math.max(-tiltCap, Math.min(tiltCap, rotDeg));

      let parX = 0, parY = 0;
      if (el.dataset.depth) {
        parX = tx * -depth;
        parY = ty * -depth * 0.5;
      }

      let breatheY = 0, breatheS = 1;
      if (isCharacter || isBanner) {
        const b = Math.sin(now / 3000 * Math.PI) * 0.5 + 0.5;
        breatheY = -b * 3;
        breatheS = 1 + b * 0.012;
      }

      if (isBanner) {
        el.style.transform =
          `translateX(-50%) translate(${shiftX}px, ${breatheY}px) scale(${breatheS}) rotate(${finalRot}deg)`;
      } else if (el.classList.contains('margot-stage') || el.classList.contains('layer')) {
        const centerPrefix = el.classList.contains('margot-stage') ? 'translateX(-50%) ' : '';
        el.style.transform =
          `${centerPrefix}translate(${parX + shiftX}px, ${parY}px) rotate(${finalRot}deg)`;
      } else {
        el.style.transform =
          `translate(${shiftX}px, ${breatheY}px) scale(${breatheS}) rotate(${finalRot}deg)`;
      }
    });

    // Sky + any layers without wind data still parallax
    layers.forEach((el) => {
      if (el.dataset.wind) return;
      const depth = parseFloat(el.dataset.depth) || 0;
      if (el.classList.contains('margot-stage')) {
        el.style.transform = `translateX(-50%) translate(${tx * -depth * 0.4}px, ${ty * -depth * 0.2}px)`;
      } else {
        el.style.transform = `translate(${tx * -depth}px, ${ty * -depth * 0.5}px)`;
      }
    });

    requestAnimationFrame(tickFrame);
  }
  requestAnimationFrame(tickFrame);

  /* ------------------------------------------------------------
     COUNTDOWN
     ------------------------------------------------------------ */
  function nextBirthday() {
    const now = new Date();
    const y = now.getFullYear();
    let bday = new Date(y, 5, 21, 0, 0, 0);
    if (now > new Date(y, 5, 21, 23, 59, 59)) bday = new Date(y + 1, 5, 21, 0, 0, 0);
    return bday;
  }
  function isBirthdayToday() {
    const n = new Date();
    return n.getMonth() === 5 && n.getDate() === 21;
  }
  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const mEl = document.getElementById('m');
  const sEl = document.getElementById('s');
  function pad(n) { return String(n).padStart(2, '0'); }
  function tickClock() {
    if (isBirthdayToday()) { document.body.classList.add('birthday'); return; }
    const target = nextBirthday();
    const diff = target - new Date();
    if (diff <= 0) { document.body.classList.add('birthday'); return; }
    dEl.textContent = pad(Math.floor(diff / 86400000));
    hEl.textContent = pad(Math.floor((diff % 86400000) / 3600000));
    mEl.textContent = pad(Math.floor((diff % 3600000) / 60000));
    sEl.textContent = pad(Math.floor((diff % 60000) / 1000));
  }
  tickClock();
  setInterval(tickClock, 1000);

  /* ------------------------------------------------------------
     PETALS — wind-aware drift, gust bursts, occasional updrafts
     ------------------------------------------------------------ */
  const petalLayer = document.getElementById('petals');
  const petalColors = ['pink', 'lavender', 'cream', 'sage'];
  const activePetals = [];

  function spawnPetal(opts = {}) {
    const p = document.createElement('div');
    const color = opts.color || petalColors[Math.floor(Math.random() * petalColors.length)];
    p.className = 'petal ' + color;
    const size = 8 + Math.random() * 14;
    p.style.width = size + 'px';
    p.style.height = (size * 1.3) + 'px';
    p.style.opacity = 0;

    const startX = opts.startX != null ? opts.startX : Math.random() * window.innerWidth;
    const startY = opts.startY != null ? opts.startY : -40;
    const isUpdraft = !!opts.updraft;

    petalLayer.appendChild(p);
    activePetals.push({
      el: p,
      x: startX,
      y: startY,
      vx: (Math.random() - 0.5) * 0.4,
      vy: isUpdraft ? -0.3 - Math.random() * 0.4 : 0.6 + Math.random() * 0.4,
      rot: Math.random() * 360,
      vr: (Math.random() - 0.5) * 2,
      windResp: 0.6 + Math.random() * 0.6,
      life: 0,
      maxLife: isUpdraft ? 9000 : (12000 + Math.random() * 8000),
      updraft: isUpdraft,
      maxOp: 0.5 + Math.random() * 0.35
    });
  }

  function updatePetals(now, dt) {
    const wind = Wind.sample(now, 200);
    for (let i = activePetals.length - 1; i >= 0; i--) {
      const s = activePetals[i];
      s.life += dt;
      s.vx += wind.v * s.windResp * 0.04 * (dt / 16);
      s.vx *= 0.98;
      if (s.updraft) {
        s.vy += 0.005 * (dt / 16);
        if (s.vy > 0.5) s.updraft = false;
      } else {
        s.vy += 0.002 * (dt / 16);
        s.vy = Math.min(s.vy, 1.4);
      }
      s.x += s.vx * dt * 0.06;
      s.y += s.vy * dt * 0.06;
      s.rot += s.vr + wind.v * 1.2;

      const fadeIn = Math.min(1, s.life / 600);
      const fadeOut = Math.max(0, 1 - Math.max(0, s.life - s.maxLife + 1500) / 1500);
      const op = Math.min(fadeIn, fadeOut) * s.maxOp;

      s.el.style.transform = `translate3d(${s.x}px, ${s.y}px, 0) rotate(${s.rot}deg)`;
      s.el.style.opacity = op.toFixed(2);

      if (s.life > s.maxLife || s.y > window.innerHeight + 60 || s.x < -100 || s.x > window.innerWidth + 100) {
        s.el.remove();
        activePetals.splice(i, 1);
      }
    }
  }

  /* ------------------------------------------------------------
     POLLEN MOTES
     ------------------------------------------------------------ */
  const moteLayer = document.getElementById('motes');
  const motes = [];

  function spawnMote() {
    const m = document.createElement('div');
    m.className = 'mote';
    const size = 2 + Math.random() * 3;
    m.style.width = size + 'px';
    m.style.height = size + 'px';
    moteLayer.appendChild(m);
    motes.push({
      el: m,
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 0.15,
      vy: 0.05 + Math.random() * 0.1,
      windResp: 0.3 + Math.random() * 0.5,
      depth: 0.3 + Math.random() * 0.7,
      life: 0,
      maxLife: 18000 + Math.random() * 12000
    });
  }
  for (let i = 0; i < 18; i++) spawnMote();

  function updateMotes(now, dt) {
    const wind = Wind.sample(now, 300);
    for (let i = motes.length - 1; i >= 0; i--) {
      const m = motes[i];
      m.life += dt;
      m.vx += wind.v * m.windResp * 0.02 * (dt / 16);
      m.vx *= 0.97;
      m.x += m.vx * dt * 0.06;
      m.y += m.vy * dt * 0.06;
      const fadeIn = Math.min(1, m.life / 1500);
      const fadeOut = Math.max(0, 1 - Math.max(0, m.life - m.maxLife + 2000) / 2000);
      const op = Math.min(fadeIn, fadeOut) * 0.3 * m.depth;
      m.el.style.transform = `translate3d(${m.x}px, ${m.y}px, 0)`;
      m.el.style.opacity = op.toFixed(2);
      if (m.life > m.maxLife || m.y > window.innerHeight + 20 || m.x < -50 || m.x > window.innerWidth + 50) {
        m.el.remove();
        motes.splice(i, 1);
        spawnMote();
      }
    }
  }

  /* ------------------------------------------------------------
     BUTTERFLIES
     ------------------------------------------------------------ */
  const butterflyLayer = document.getElementById('butterflies');
  const butterflyColors = ['#c9b8e0', '#f3c5cf', '#d4b3d8'];
  const butterflies = [];

  function butterflySVG(color) {
    return `<svg viewBox="0 0 40 32" xmlns="http://www.w3.org/2000/svg">
      <g class="wing left"><ellipse cx="12" cy="14" rx="10" ry="9" fill="${color}" opacity="0.85"/><ellipse cx="14" cy="22" rx="6" ry="5" fill="${color}" opacity="0.7"/></g>
      <g class="wing right"><ellipse cx="28" cy="14" rx="10" ry="9" fill="${color}" opacity="0.85"/><ellipse cx="26" cy="22" rx="6" ry="5" fill="${color}" opacity="0.7"/></g>
      <ellipse cx="20" cy="16" rx="1.2" ry="6" fill="#5a4a6b"/>
    </svg>`;
  }

  function spawnButterfly() {
    const b = document.createElement('div');
    b.className = 'butterfly';
    const color = butterflyColors[Math.floor(Math.random() * butterflyColors.length)];
    const scale = 0.7 + Math.random() * 0.7;
    b.style.width = (22 * scale) + 'px';
    b.style.height = (18 * scale) + 'px';
    b.innerHTML = butterflySVG(color);
    butterflyLayer.appendChild(b);
    butterflies.push({
      el: b,
      baseY: 30 + Math.random() * 60,
      duration: 16000 + Math.random() * 10000,
      startTime: performance.now(),
      windOffset: 0
    });
  }

  function updateButterflies(now, dt) {
    const wind = Wind.sample(now, 100);
    for (let i = butterflies.length - 1; i >= 0; i--) {
      const b = butterflies[i];
      const t = (now - b.startTime) / b.duration;
      if (t >= 1) {
        b.el.remove();
        butterflies.splice(i, 1);
        continue;
      }
      const baseX = -30 + (window.innerWidth + 60) * t;
      b.windOffset += wind.v * 0.3 * (dt / 16);
      b.windOffset *= 0.94;
      const x = baseX + b.windOffset * 8;
      const wave = Math.sin(t * Math.PI * 4) * 40;
      const drift = Math.sin(t * Math.PI * 2) * 20;
      const y = (b.baseY + wave + drift) * (window.innerHeight / 100);
      const rot = Math.sin(t * Math.PI * 6) * 12 + b.windOffset * 4;
      b.el.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
    }
  }

  function butterflyLoop() {
    spawnButterfly();
    setTimeout(butterflyLoop, 6000 + Math.random() * 8000);
  }
  setTimeout(butterflyLoop, 1500);
  setTimeout(spawnButterfly, 4000);

  /* ------------------------------------------------------------
     Master particle update loop
     ------------------------------------------------------------ */
  let lastFrame = performance.now();
  let lastPetalSpawn = 0;
  function particleLoop(now) {
    const dt = now - lastFrame;
    lastFrame = now;

    updatePetals(now, dt);
    updateMotes(now, dt);
    updateButterflies(now, dt);

    let interval = 700;
    if (globalGust > 0.3) interval = 220;
    if (now - lastPetalSpawn > interval) {
      spawnPetal();
      lastPetalSpawn = now;
      // Strong gust: extra petals from foliage edges
      if (globalGust > 0.6 && Math.random() < 0.5) {
        const fromLeft = Math.random() < 0.5;
        spawnPetal({
          startX: fromLeft ? -20 : window.innerWidth + 20,
          startY: window.innerHeight * (0.6 + Math.random() * 0.3)
        });
      }
      // Rare updraft during peak gust
      if (globalGust > 0.7 && Math.random() < 0.08) {
        spawnPetal({
          startX: window.innerWidth * (0.2 + Math.random() * 0.6),
          startY: window.innerHeight * (0.85 + Math.random() * 0.1),
          updraft: true
        });
      }
    }

    requestAnimationFrame(particleLoop);
  }
  for (let i = 0; i < 12; i++) {
    spawnPetal({
      startX: Math.random() * window.innerWidth,
      startY: Math.random() * window.innerHeight * 0.6
    });
  }
  requestAnimationFrame(particleLoop);

  if (isBirthdayToday()) {
    setInterval(() => spawnPetal(), 200);
    setInterval(spawnButterfly, 2000);
  }
</script>

</body>
</html>
